<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="manifest" href="/novogarden-app/manifest.json">
<meta name="theme-color" content="#7DB532">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Novogarden &ndash; R&eacute;servation</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --green: #7DB532;
  --dark-green: #5a8e1e;
  --cream: #FAF9F5;
  --dark: #14140F;
  --grey: #808080;
  --grey-light: #E8E6E6;
  --radius: 16px;
  --shadow: 0 4px 20px rgba(125,181,50,0.15);
}

html, body {
  width: 100%; height: 100%;
  background: var(--cream);
  font-family: 'Montserrat', sans-serif;
  font-weight: 600;
  color: var(--dark);
  overflow: hidden;
}

/* -- SCREENS -- */
.screen { display: none; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; }
.screen.active { display: flex; }
